syntax = "proto3";

package emuspecs;

option go_package = "github.com/kreove/omni-infra-provider-vergeos/api/specs";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// MachineSpec is stored in Omni in the infra provisioner state.
message MachineSpec {
  string uuid = 1;
  string schematic = 2;
  string talos_version = 3;
  string volume_id = 4;
}
