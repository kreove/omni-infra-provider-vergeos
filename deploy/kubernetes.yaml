apiVersion: v1
kind: Namespace
metadata:
  name: omni-infra-provider-vergeos
---
apiVersion: v1
kind: Secret
metadata:
  name: provider-credentials
  namespace: omni-infra-provider-vergeos
type: Opaque
stringData:
  OMNI_ENDPOINT: https://omni.example.com
  OMNI_SERVICE_ACCOUNT_KEY: replace-me
  VERGEOS_ENDPOINT: https://vergeos.example.com
  VERGEOS_API_KEY: replace-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-infra-provider-vergeos
  namespace: omni-infra-provider-vergeos
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: omni-infra-provider-vergeos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omni-infra-provider-vergeos
    spec:
      containers:
        - name: provider
          image: ghcr.io/OWNER/omni-infra-provider-vergeos:VERSION
          imagePullPolicy: IfNotPresent
          env:
            - name: TALOS_IMAGE_FACTORY_BASE_URL
              value: https://factory.talos.dev
          envFrom:
            - secretRef:
                name: provider-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
